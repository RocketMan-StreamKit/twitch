name: Sync addon to RocketMan catalog

on:
  release:
    types: [published]
  workflow_call:
  workflow_dispatch:
    inputs:
      token:
        description: The token to use to sync the repository
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve org/repo from manifest.json
        id: addon
        run: |
          ADDON_ID=$(jq -r '.id' manifest.json)
          echo "repo=${{ github.repository_owner }}/$ADDON_ID" >> "$GITHUB_OUTPUT"

      - name: Notify catalog about the new release
        env:
          TOKEN: ${{ inputs.token || secrets.ROCKETMAN_ADDON_TOKEN }}
        run: |
          curl -sS -X POST "https://rocketman-streams.com/api/extensions/dev/sync" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"${{ steps.addon.outputs.repo }}\",\"token\":\"${{ env.TOKEN }}\"}"